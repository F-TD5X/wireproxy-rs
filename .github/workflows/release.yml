name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  BINARY_NAME: wireproxy-rs

permissions:
  contents: read

jobs:
  build-musl:
    name: Build ${{ matrix.label }} musl binary
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_dir: amd64
            label: x86_64
            runs_on: ubuntu-latest
            linker: x86_64-linux-musl-gcc
            target_env: X86_64_UNKNOWN_LINUX_MUSL
          - target: aarch64-unknown-linux-musl
            artifact_dir: arm64
            label: arm64
            runs_on: ubuntu-24.04-arm
            linker: aarch64-linux-musl-gcc
            target_env: AARCH64_UNKNOWN_LINUX_MUSL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Configure Rust musl linker
        run: |
          echo "CC_${{ matrix.target_env }}=${{ matrix.linker }}" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_${{ matrix.target_env }}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist/${{ matrix.artifact_dir }}
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} dist/${{ matrix.artifact_dir }}/${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: dist/${{ matrix.artifact_dir }}/${{ env.BINARY_NAME }}
          if-no-files-found: error

  docker:
    name: Build and push GHCR image
    runs-on: ubuntu-latest
    needs: build-musl
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-musl
          path: dist/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-unknown-linux-musl
          path: dist/arm64

      - name: Mark binaries executable
        run: chmod +x dist/amd64/${{ env.BINARY_NAME }} dist/arm64/${{ env.BINARY_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
