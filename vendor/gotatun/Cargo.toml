[package]
edition = "2024"
rust-version = "1.88"
name = "gotatun"
version = "0.2.0"
authors = [
    "Noah Kennedy <nkennedy@cloudflare.com>",
    "Andy Grover <agrover@cloudflare.com>",
    "Jeff Hiner <jhiner@cloudflare.com>",
    "Mullvad VPN",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "an implementation of the WireGuard® protocol designed for portability and speed"
readme = "README.md"
keywords = [
    "wireguard",
    "vpn",
]
categories = [
    "network-programming",
    "asynchronous",
]
license = "BSD-3-Clause"
repository = "https://github.com/mullvad/gotatun"
resolver = "2"

[features]
daita = []
default = []
device = ["thiserror"]
pcap = ["dep:pcap-file"]
windows-gro = []

[lib]
name = "gotatun"
crate-type = [
    "staticlib",
    "cdylib",
    "rlib",
]
path = "src/lib.rs"

[[bench]]
name = "crypto_benches"
path = "benches/crypto_benches/main.rs"
harness = false

[[bench]]
name = "throughput_benches"
path = "benches/throughput_benches/main.rs"
harness = false

